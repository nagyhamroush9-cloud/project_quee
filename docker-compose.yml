services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hqms}
      MYSQL_USER: ${MYSQL_USER:-hqms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hqms_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: ./server
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-hqms}
      DB_USER: ${MYSQL_USER:-hqms}
      DB_PASSWORD: ${MYSQL_PASSWORD:-hqms_password}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@hqms.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "4000"

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mysql_data:

